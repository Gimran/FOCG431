[env:genericSTM32G431CB]
platform = ststm32
board = genericSTM32G431CB
framework = arduino
debug_tool = stlink
upload_protocol = stlink
lib_deps = 
	; askuric/Simple FOC@^2.3.5
	https://github.com/simplefoc/Arduino-FOC.git#fix_lowside_sync_lost
	; simplefoc/SimpleFOCDrivers@^1.0.9
	https://github.com/simplefoc/Arduino-FOC-drivers.git#feat_can_commander
	embeddedartistry/LibPrintf@^1.2.13
	https://github.com/simplefoc/SimpleCANio.git
lib_archive = false
; lib_ldf_mode = chain+
build_flags = 
	-D HAL_CORDIC_MODULE_ENABLED
	-D HAL_FDCAN_MODULE_ENABLED
	
